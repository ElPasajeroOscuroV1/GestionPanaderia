<h2>Registrar Producción</h2>

<label>Receta</label>

<select [(ngModel)]="receta_id">
  <option *ngFor="let r of recetas" [value]="r.id">
    {{r.nombre}}
  </option>
</select>

<br><br>

<label>Cantidad</label>

<input type="number" [(ngModel)]="cantidad">

<br><br>

<button (click)="producir()">Producir</button>
